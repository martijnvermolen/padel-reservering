name: Padel Reservering

on:
  schedule:
    # Cron tijden in UTC. Nederland is UTC+1 (winter) / UTC+2 (zomer).
    # Per reservering TWEE triggers (winter + zomer) zodat de bot altijd
    # ~20 min voor het 48u-venster start, ongeacht het seizoen.
    # De verkeerde-seizoen trigger detecteert automatisch dat er niets
    # te reserveren is en stopt direct. GitHub Actions cron kan 5-30 min
    # vertraagd zijn, dus 20 min buffer is noodzakelijk.
    #
    # DINSDAG 21:30 -> 48u eerder = ZONDAG 21:30 NL -> start 21:10 NL
    - cron: '10 19 * * 0'    # zomer (UTC+2): zo 21:10 CEST
    - cron: '10 20 * * 0'    # winter (UTC+1): zo 21:10 CET
    #
    # ZONDAG 19:30 -> 48u eerder = VRIJDAG 19:30 NL -> start 19:10 NL
    - cron: '10 17 * * 5'    # zomer (UTC+2): vr 19:10 CEST
    - cron: '10 18 * * 5'    # winter (UTC+1): vr 19:10 CET

  workflow_dispatch:            # Handmatig triggeren mogelijk via GitHub UI

concurrency:
  group: padel-reservering
  cancel-in-progress: false

jobs:
  reserveer:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 120        # Ruim voor wachttijd + retry-loop (acceptatievenster tot 90 min)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Installeer Python packages
        run: pip install -r requirements.txt

      - name: Sync spelerslijst
        env:
          KNLTB_USERNAME: ${{ secrets.KNLTB_USERNAME }}
          KNLTB_PASSWORD: ${{ secrets.KNLTB_PASSWORD }}
        run: python main.py --sync-spelers --verbose

      - name: Commit spelerslijst
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add players.json
          git diff --cached --quiet || git commit -m "Sync spelerslijst"
          git push || true

      - name: Reserveer padelbaan
        env:
          KNLTB_USERNAME: ${{ secrets.KNLTB_USERNAME }}
          KNLTB_PASSWORD: ${{ secrets.KNLTB_PASSWORD }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Handmatige trigger - zonder retry-loop"
            python main.py --no-retry --verbose
          else
            echo "Geplande trigger - met retry-loop"
            python main.py --verbose
          fi

      - name: Upload logfile
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: reservering-log-${{ github.run_id }}
          path: reservering.log
          retention-days: 7

      - name: Upload HTML dump (indien aanwezig)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: court-html-${{ github.run_id }}
          path: court_dump.html
          if-no-files-found: ignore
          retention-days: 7
